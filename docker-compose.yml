services:
  db:
    image: postgres:15-alpine
    container_name: holansoft_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: holansoft
    ports:
      - "5436:5432"
    volumes:
      - holansoft_data:/var/lib/postgresql/data

volumes:
  holansoft_data:
